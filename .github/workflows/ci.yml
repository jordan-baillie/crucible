name: ci
on:
  push: {branches: [master]}
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e vendor/research_integrity && pip install -e . && pip install pytest
      - run: pytest tests/ -q
